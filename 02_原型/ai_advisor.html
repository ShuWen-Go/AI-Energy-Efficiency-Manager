<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI顾问对话 · AI能效管家</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#EDEDED;color:#1F1F1F;display:flex;justify-content:center;min-height:100vh}
  .phone{width:375px;background:#EDEDED;min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,.08);display:flex;flex-direction:column}
  .statusbar{height:36px;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 16px;font-size:12px;font-weight:600;flex-shrink:0}
  .navbar{background:#fff;height:44px;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid #E8E8E8;flex-shrink:0}
  .navbar .back{font-size:22px;color:#1677FF;cursor:pointer}
  .navbar .title{flex:1;text-align:center;font-size:16px;font-weight:600}
  /* 对话区 */
  .chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
  /* 引导卡片 */
  .guide{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .guide h3{font-size:15px;margin-bottom:10px}
  .guide .hello{font-size:15px;font-weight:600;margin-bottom:8px}
  .guide .can,.guide .cant,.guide .how{font-size:12px;line-height:1.8;margin-bottom:8px}
  .guide .can b{color:#52C41A}
  .guide .cant b{color:#FF4D4F}
  .guide .how b{color:#1677FF}
  .guide .ctx{background:#E6F4FF;border-radius:6px;padding:8px 10px;font-size:11px;color:#1677FF;margin-bottom:10px}
  .btn-start{width:100%;background:#1677FF;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;cursor:pointer;font-weight:500}
  /* 模板选择 */
  .tpl-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
  .tpl-btn{background:#F0F5FF;border:1px solid #ADC6FF;border-radius:8px;padding:12px 4px;text-align:center;font-size:12px;cursor:pointer;color:#1677FF}
  .tpl-btn:hover{background:#E6F4FF}
  .tpl-btn .ic{font-size:18px;display:block;margin-bottom:4px}
  .tpl-more{text-align:center;font-size:12px;color:#1677FF;cursor:pointer;margin-top:6px}
  .tpl-hint{text-align:center;font-size:11px;color:#BFBFBF;margin-top:8px}
  /* 对话气泡 */
  .msg{display:flex;gap:8px;max-width:88%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg .avatar{width:32px;height:32px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
  .msg.ai .avatar{background:#1677FF}
  .msg.user .avatar{background:#52C41A}
  .bubble{padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.6}
  .msg.ai .bubble{background:#fff;border-top-left-radius:2px}
  .msg.user .bubble{background:#95EC69;border-top-right-radius:2px}
  .bubble .b-title{font-weight:600;margin-bottom:4px}
  .bubble .b-sub{font-size:12px;color:#8C8C8C;margin-top:6px}
  .bubble .b-action{display:inline-block;background:#1677FF;color:#fff;font-size:11px;padding:4px 10px;border-radius:4px;margin-top:6px;cursor:pointer}
  .bubble .b-bar{height:6px;background:#F0F0F0;border-radius:3px;margin:6px 0;overflow:hidden}
  .bubble .b-bar i{display:block;height:100%;background:#1677FF;border-radius:3px}
  /* 反馈 */
  .feedback{display:flex;gap:12px;margin-top:6px;font-size:12px}
  .feedback span{cursor:pointer;color:#8C8C8C}
  .feedback span:hover{color:#1677FF}
  /* 输入栏 */
  .inputbar{background:#fff;border-top:1px solid #E8E8E8;padding:8px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0}
  .inputbar input{flex:1;border:1px solid #E8E8E8;border-radius:6px;padding:8px 10px;font-size:13px;outline:none}
  .inputbar input:focus{border-color:#1677FF}
  .inputbar .send{background:#1677FF;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer}
  .inputbar .send:disabled{background:#BFBFBF}
  /* 降级引导 */
  .degrade{background:#FFF7E6;border:1px solid #FFE58F;border-radius:8px;padding:12px}
  .degrade .d-title{font-size:13px;font-weight:600;margin-bottom:8px}
  .degrade .d-opt{background:#fff;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px;cursor:pointer;border:1px solid #F0F0F0}
  .degrade .d-opt:hover{border-color:#1677FF;color:#1677FF}
  /* loading */
  .loading{display:flex;gap:4px;align-items:center;padding:4px 0}
  .loading i{width:6px;height:6px;background:#BFBFBF;border-radius:50%;animation:b 1.2s infinite}
  .loading i:nth-child(2){animation-delay:.2s}
  .loading i:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,80%,100%{opacity:.3}40%{opacity:1}}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>8:32</span><span>▮▮▮ 📶 🔋92%</span></div>
  <div class="navbar">
    <span class="back" onclick="location.href='weekly_report.html'">‹</span>
    <span class="title">AI能效顾问</span>
  </div>

  <div class="chat" id="chat">
    <!-- 上下文提示 -->
    <div class="guide">
      <div class="ctx">📌 来自：呼吸内科上周能耗周报 · 已携带上下文（科室：呼吸内科 / 时间：上周 / 异常：夜间空调未关）</div>
    </div>

    <!-- 能力边界声明（首次进入） -->
    <div class="guide" id="onboard">
      <div class="hello">👋 你好，我是AI能效管家</div>
      <div class="can"><b>✅ 我能帮你：</b><br>查看科室能耗（用了多少电、各分项）· 查询异常记录（几次、什么类型、处理了吗）· 了解政策标准（国考指标、碳排放要求）· 了解你的排名</div>
      <div class="cant"><b>⚠️ 我暂时不会：</b><br>查患者信息或医疗数据 · 控制空调或照明设备</div>
      <div class="how"><b>🛡️ 怎么保证我说得对：</b><br>数据直接来自电表不经过加工 · AI分析会标注可靠性 · 如果不确定我会直接告诉你</div>
      <button class="btn-start" onclick="startChat()">开始使用</button>
    </div>
  </div>

  <div class="inputbar">
    <input type="text" id="input" placeholder="直接问我，或选择上方模板..." disabled>
    <button class="send" id="sendBtn" disabled onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
let started=false;
function startChat(){
  document.getElementById('onboard').style.display='none';
  started=true;
  document.getElementById('input').disabled=false;
  document.getElementById('sendBtn').disabled=false;
  // 显示模板选择引导
  const c=document.getElementById('chat');
  const tpl=document.createElement('div');
  tpl.className='guide';
  tpl.innerHTML=`
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">💬 你可以直接问我，或选择一个常用查询：</div>
    <div class="tpl-row">
      <div class="tpl-btn" onclick="askTpl('用电量本周')"><span class="ic">📊</span>用电量本周</div>
      <div class="tpl-btn" onclick="askTpl('查异常本周')"><span class="ic">🔍</span>查异常本周</div>
      <div class="tpl-btn" onclick="askTpl('看排名')"><span class="ic">🏆</span>看排名</div>
    </div>
    <div class="tpl-more" onclick="location.href='template_query.html'">更多查询 ›</div>
    <div class="tpl-hint">或者直接打字问我</div>
  `;
  c.appendChild(tpl);
  c.scrollTop=c.scrollHeight;
}
function askTpl(q){
  document.getElementById('input').value=q;
  sendMsg();
}
function addMsg(type,html){
  const c=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='msg '+type;
  m.innerHTML=`<div class="avatar">${type==='ai'?'🤖':'🧑'}'</div><div class="bubble">${html}</div>`;
  c.appendChild(m);
  c.scrollTop=c.scrollHeight;
  return m;
}
function addLoading(){
  const c=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='msg ai';
  m.id='loadingMsg';
  m.innerHTML=`<div class="avatar">🤖</div><div class="bubble"><div class="loading"><i></i><i></i><i></i> 正在查询...</div></div>`;
  c.appendChild(m);
  c.scrollTop=c.scrollHeight;
}
function removeLoading(){const l=document.getElementById('loadingMsg');if(l)l.remove();}
function sendMsg(){
  if(!started)return;
  const inp=document.getElementById('input');
  const q=inp.value.trim();
  if(!q)return;
  addMsg('user',q);
  inp.value='';
  addLoading();
  setTimeout(()=>{
    removeLoading();
    reply(q);
  },900);
}
function reply(q){
  if(q.includes('用电量')||q.includes('用了多少')){
    addMsg('ai',`<div class="b-title">📊 呼吸内科本周用电</div>
      <b>总用电 5,200 kWh</b><br>
      空调 3,100 (60%) · 照明 800 (15%) · 设备 1,300 (25%)
      <div class="b-bar"><i style="width:60%;background:#1677FF"></i></div>
      <div class="b-bar"><i style="width:15%;background:#52C41A"></i></div>
      <div class="b-bar"><i style="width:25%;background:#FAAD14"></i></div>
      <div class="b-sub">较上月 +5.2% · 日均 743 kWh</div>`);
  }else if(q.includes('异常')||q.includes('几次')){
    addMsg('ai',`<div class="b-title">🔍 本周异常记录</div>
      发现 <b>2条</b>异常：<br>
      ① 6/18 夜间空调未关（👤行为类·🟡中）<br>
      ② 6/20 照明下班未关（👤行为类·🟡中）<br>
      本月累计 <b>3次</b>，额外耗电约 201 kWh（≈160元）
      <br><span class="b-action" onclick="location.href='anomaly_detail.html'">查看异常详情</span>`);
  }else if(q.includes('排名')){
    addMsg('ai',`<div class="b-title">🏆 全院排名</div>
      呼吸内科本周 <b>第5/32位</b>，较上周 ↑3位<br>
      同类科室中排名第2（内科系列）
      <br><span class="b-action" onclick="location.href='dept_ranking.html'">查看完整排名</span>`);
  }else{
    // 降级引导
    addMsg('ai',`<div class="degrade">
      <div class="d-title">🤔 我不太确定你想要什么</div>
      <div style="font-size:11px;color:#8C8C8C;margin-bottom:6px">你想查的是不是下面这些？</div>
      <div class="d-opt" onclick="askTpl('用电量本周')">📊 "我们科本周用了多少电"</div>
      <div class="d-opt" onclick="askTpl('查异常本周')">🔍 "我们科本周有没有异常"</div>
      <div class="d-opt" onclick="askTpl('看排名')">🏆 "我们科现在全院排第几"</div>
      <div style="font-size:11px;color:#BFBFBF;margin-top:6px">如果没有，也可以换个方式再问我一次</div>
    </div>`);
  }
  // 添加反馈
  const last=document.querySelector('#chat .msg.ai:last-child .bubble');
  if(last){
    const fb=document.createElement('div');
    fb.className='feedback';
    fb.innerHTML=`<span onclick="this.textContent='谢谢反馈！'">👍 有用</span><span onclick="showFb()">👎 待改进</span>`;
    last.appendChild(fb);
  }
}
function showFb(){
  const c=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='guide';
  m.innerHTML=`<div style="font-size:13px;font-weight:600;margin-bottom:8px">👎 感谢反馈，请告诉我们哪里有问题：</div>
    <div class="d-opt" style="background:#fff;border:1px solid #F0F0F0;border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer;font-size:12px" onclick="this.parentElement.remove()">数据不对</div>
    <div class="d-opt" style="background:#fff;border:1px solid #F0F0F0;border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer;font-size:12px" onclick="this.parentElement.remove()">原因分析不对</div>
    <div class="d-opt" style="background:#fff;border:1px solid #F0F0F0;border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer;font-size:12px" onclick="this.parentElement.remove()">看不懂</div>
    <div class="d-opt" style="background:#fff;border:1px solid #F0F0F0;border-radius:6px;padding:8px;cursor:pointer;font-size:12px" onclick="this.parentElement.remove()">其他</div>`;
  c.appendChild(m);
  c.scrollTop=c.scrollHeight;
}
document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
</script>
</body>
</html>
